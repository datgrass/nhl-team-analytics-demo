bundle:
  name: nhl-team-analytics

variables:
  warehouse_id:
    description: "SQL Warehouse ID for querying Delta tables"
  lakebase_instance:
    description: "Lakebase instance name for comments"
    default: "nhl-comments"
  lakebase_host:
    description: "Lakebase read-write DNS hostname"
  puckpedia_api_key:
    description: "Puck Pedia API key"
    default: "YOUR_PUCKPEDIA_API_KEY"
  model_endpoint:
    description: "Foundation Model API endpoint name"
    default: "databricks-claude-sonnet-4-5"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/nhl-team-analytics

resources:
  jobs:
    nhl_data_ingestion:
      name: "NHL Data Ingestion"
      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"
        timezone_id: "America/Denver"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./pipeline/ingest_nhl_data.py
            source: WORKSPACE
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - requests

    nhl_lakebase_setup:
      name: "NHL Lakebase Setup (one-time)"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ./pipeline/setup_lakebase.py
            source: WORKSPACE
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - psycopg2-binary

  apps:
    nhl_team_analytics:
      name: "nhl-team-analytics"
      description: "NHL Team Analytics - Interactive dashboard with AI assistant"
      source_code_path: .
      config:
        command:
          - uvicorn
          - backend.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: PUCKPEDIA_API_KEY
            value: ${var.puckpedia_api_key}
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: LAKEBASE_HOST
            value: ${var.lakebase_host}
      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.model_endpoint}
            permission: CAN_QUERY
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: lakebase
          database:
            instance_name: ${var.lakebase_instance}
            database_name: nhl_comments
            permission: CAN_CONNECT_AND_CREATE

targets:
  dev:
    mode: development
    default: true
